    // q8
    let array=[1,2,3,4,56,1,22,23,33,23,56]

    let unique=[]
    for(let element of array){
        if(!unique.includes(element)){
            unique.push(element)
        }
    }
    console.log(unique)
    for (let e of unique){ // 1,2,3,4,56,22,23,33
        let count=0
        for(let e1 of array){
            if(e===e1){
                count++ // 33-1
            }
        }
       document.write(e+":"+count+"<br>")

    }

        let max=ar[0] // 89
