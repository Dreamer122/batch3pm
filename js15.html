<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <!-- string questions -->
     <script>
        // count the number of words in a string
        let sen="hello This is string topic"
        let words=sen.split(" ").length;
        document.write(words)

        // count number of vowels present in string 
        let c=0;
        for(let i of sen){
         if(i=='a' || i=="i" || i=="e" || i=="o" || i=='u'||i=="A" || i=="I" || i=="E" || i=="O" || i=="U"){
            c++
         }
        }
        document.write("vowels="+c)

        // find the occurence of a specific word  ex -> is
        let countis=0
            let arraywords=sen.split(" ")
            for(let w of arraywords){
               if( w.includes('is')){
                countis++
               }
            }
            document.write("count is=",countis)
            
     </script>
</body>
</html>
