<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<!-- operators  -> it is just a symbol which is used to perform operations on operands.
-> a+b -> + operator 
types of operators ->
1. Arithmetic operators -> + - * /(3/2 -> quaotient -> 1.5) 
 %(modulus) -> remainder -> 3%2 -> 1
 ++ -> a++ -> a=a+1
 -- -> a-- -> a=a-1
 ** (exponentiation) -> 2**3 -> 8

2. relational operators -> > < >= <=
 == (equal to)
  != (not equal to)
  === (strict equal to) -> it checks both value and datatype
    !== (strict not equal to) -> it checks both value and datatype
3. logical 
4. assignment

-->

<script>

    var x=10;
    var y=20;
    document.write(x%y+"<br>");
    document.write(x**y+"<br>");
    x++
    document.write(x+"<br>");
    y--
    document.write(y+"<br>");

    //  5 subjects then total , percentage
    var hindi=89;
    var english=78;
    var math=90;
    var science=95;
    var social=80;
    var total=hindi+english+math+science+social;
    var per=total/500*100
    document.write("total marks="+total+"<br>");
    document.write("percentage="+per+"<br>");

</script>

    
</body>
</html>
