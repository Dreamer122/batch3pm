<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <!-- form 
      -->

      <form action="" id="form1">
        <input type="text" placeholder="enter your name" id="username"> <br>
        <input type="email" placeholder="enter your email" id="useremail"> <br>
        <!-- gender -->
         <p> Gender</p> <br>
         <input type="radio" id="male" name="gender" value="male"><label for="male"> male</label>
         <input type="radio" id="female" name="gender" value="Female"> <label for="female">Female</label> 
<br>
         <!-- checkbox for hobbies -->
            <p> Hobbies</p> <br>
            <input type="checkbox" id="hobby1" name="hobby" value="reading"><label for="hobby1"> reading</label>
            <input type="checkbox" id="hobby2" name="hobby" value="swimming"><label for="hobby2"> swimming</label>
            <input type="checkbox" id="hobby3" name="hobby" value="cycling"><label for="hobby3"> Cycling</label>
      <br> <label for="city">City</label>
            <select id="city">
        <option value="faridabad"> faridabad </option>
        <option value="delhi"> delhi </option>
        <option value="pune"> pune</option>
       </select>
            <input type="submit" value="submit">
      </form>

      <script>
        function Submitfunc(e){
            e.preventDefault()
            console.log("form submitted",e)
            let name=document.querySelector("#username").value;
            let email=document.querySelector("#useremail").value;
            let gender=document.getElementsByName("gender")
            let checkboxes=document.getElementsByName("hobby")
            let city=document.querySelector("#city").value
            console.log("name=",name,"email=",email)
            console.log("gender",gender)
            console.log("checkbox",checkboxes)
            let gen=''

            for(let option of gender){  
              if(option.checked){
                gen=option.value
              }
            }
            let hobbies=[]
            for(let hobby of checkboxes){
                if(hobby.checked){
                    hobbies.push(hobby.value)
                }
            }
            console.log("gender",gen)
            console.log("hobbies",hobbies)
            console.log("city",city)
            return false
            

        }
        document.querySelector("#form1").addEventListener("submit",Submitfunc)
      </script>
</body>
</html>
