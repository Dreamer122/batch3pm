     function fizbuz(){
        // var num=Number(prompt("enter a number"))
        for (var num=1;num<=50;num++){
        if(num%3==0 && num%5==0){
            document.write("fizzbuzz",num,"<br>")
        }
        else if(num%3==0){
            document.write("fizz",num,"<br>")
        }
        else if(num%5==0){
            document.write("buzz",num,"<br>")
        }
        else{
            document.write(num,"<br>")
        }
     }
    }
